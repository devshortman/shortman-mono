services:
  - type: web
    name: shortman-mono
    env: python
    region: singapore
    buildCommand: |
      cd backend/backend
      pip install -r requirements.txt
    startCommand: |
      cd backend/backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: APP_ENV
        value: prod
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    healthCheckPath: /health
